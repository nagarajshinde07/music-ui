<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ECHO PREMIUM · Neon Rhythms</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ========== THEME VARIABLES ========== */
    :root {
      --bg-gradient: radial-gradient(circle at 20% 30%, #0a0c1a, #020208);
      --surface: rgba(12, 14, 32, 0.6);
      --card-bg: rgba(18, 20, 40, 0.6);
      --text-primary: #f0f0fc;
      --text-secondary: #c2baf0;
      --accent: #7c3aed;
      --accent-glow: #c084fc;
      --border-light: rgba(124, 58, 237, 0.3);
      --navbar-bg: rgba(6, 8, 20, 0.7);
      --input-bg: rgba(20, 22, 45, 0.7);
      --progress-bg: #2c284f;
      --shadow-color: rgba(124, 58, 237, 0.3);
    }

    body.light {
      --bg-gradient: linear-gradient(145deg, #f8f7ff, #efebff);
      --surface: rgba(255, 255, 255, 0.75);
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-primary: #1e1b2f;
      --text-secondary: #5a4a9e;
      --accent: #6d28d9;
      --accent-glow: #8b5cf6;
      --border-light: rgba(109, 40, 217, 0.3);
      --navbar-bg: rgba(245, 243, 255, 0.9);
      --input-bg: rgba(0, 0, 0, 0.05);
      --progress-bg: #ddd6fe;
      --shadow-color: rgba(109, 40, 217, 0.3);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
      padding-bottom: 90px;
      transition: background 0.3s ease, color 0.2s ease;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #11121f; }
    body.light ::-webkit-scrollbar-track { background: #ddd6fe; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    /* ========== NAVBAR ========== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      backdrop-filter: blur(20px);
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--border-light);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--accent-glow));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-actions {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .theme-btn, .shuffle-playlist-btn {
      background: rgba(124,58,237,0.15);
      border: 1px solid var(--border-light);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .theme-btn:hover, .shuffle-playlist-btn:hover {
      background: var(--accent);
      transform: scale(1.02);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .shuffle-active-global {
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* MODERN SEARCH BAR */
    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      #shufflePlaylistBtn{
        margin-left: 10%;
      }
    }
    .search-input {
      background: var(--input-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: 60px;
      padding: 0.7rem 1rem 0.7rem 2.8rem;
      width: 240px;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      outline: none;
    }
    .search-input:focus {
      width: 320px;
      border-color: var(--accent-glow);
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .search-icon-left {
      position: absolute;
      left: 1rem;
      pointer-events: none;
      color: var(--accent-glow);
    }
    .voice-icon {
      position: absolute;
      right: 1rem;
      color: var(--accent-glow);
      cursor: pointer;
      background: none;
      border: none;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .navbar { flex-direction: column; align-items: stretch; }
      .search-input { width: 100%; }
      .search-input:focus { width: 100%; }
      .search-wrapper { width: 100%; }
      .nav-actions { justify-content: space-between; }
    }

    /* ========== NOW PLAYING CARD ========== */
    .container { max-width: 1280px; margin: 0 auto; padding: 2rem 2rem 1rem; }
    .now-playing-section { display: flex; justify-content: center; margin-bottom: 3rem; }
    .player-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 2rem;
      text-align: center;
      max-width: 520px;
      width: 100%;
      border: 1px solid var(--border-light);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
      transition: transform 0.25s, box-shadow 0.3s;
    }
    .player-card:hover { transform: scale(1.01); box-shadow: 0 30px 50px -15px var(--shadow-color); border-color: var(--accent-glow); }
    .album-art {
      width: 240px;
      height: 240px;
      margin: 0 auto 1.2rem;
      border-radius: 1.8rem;
      overflow: hidden;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5), 0 0 0 2px var(--accent-glow);
    }
    .album-art img { width: 100%; height: 100%; object-fit: cover; }
    .song-title { font-size: 1.9rem; font-weight: 800; margin: 0.5rem 0 0.2rem; }
    .artist { font-size: 1rem; color: var(--text-secondary); margin-bottom: 1rem; }
    .equalizer-animation {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 1rem 0;
      height: 40px;
      align-items: center;
    }
    .eq-bar-anim {
      width: 6px;
      background: linear-gradient(to top, var(--accent), var(--accent-glow));
      border-radius: 4px;
      animation: waveEq 0.9s infinite ease alternate;
    }
    .eq-bar-anim:nth-child(1) { animation-delay: 0s; height: 16px; }
    .eq-bar-anim:nth-child(2) { animation-delay: 0.2s; height: 32px; }
    .eq-bar-anim:nth-child(3) { animation-delay: 0.4s; height: 24px; }
    .eq-bar-anim:nth-child(4) { animation-delay: 0.1s; height: 38px; }
    .eq-bar-anim:nth-child(5) { animation-delay: 0.3s; height: 20px; }
    @keyframes waveEq {
      0% { transform: scaleY(0.5); opacity: 0.6; }
      100% { transform: scaleY(1.2); opacity: 1; }
    }

    /* ========== PLAYLIST GRID ========== */
    .playlist-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .playlist-header h2 { font-size: 1.8rem; background: linear-gradient(135deg, #fff, var(--accent-glow)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
    .song-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 1.2rem;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid var(--border-light);
    }
    .song-card:hover { transform: translateY(-6px); border-color: var(--accent-glow); box-shadow: 0 12px 24px -10px var(--shadow-color); }
    .song-card.active-song { border: 2px solid var(--accent-glow); background: linear-gradient(145deg, rgba(124,58,237,0.2), rgba(0,0,0,0.2)); box-shadow: 0 0 15px var(--accent-glow); }
    .song-cover { width: 100%; aspect-ratio: 1; border-radius: 1rem; object-fit: cover; margin-bottom: 0.8rem; }
    .song-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px; }

    /* ========== STICKY BOTTOM PLAYER ========== */
    .sticky-player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--navbar-bg);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border-light);
      padding: 0.8rem 2rem;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .player-track-info { display: flex; align-items: center; gap: 14px; min-width: 200px; }
    .mini-cover { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; }
    .track-details h4 { font-size: 0.9rem; font-weight: 600; }
    .track-details p { font-size: 0.7rem; color: var(--text-secondary); }
    .player-controls { display: flex; gap: 1.5rem; align-items: center; }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
    }
    .ctrl-btn svg { width: 28px; height: 28px; fill: currentColor; }
    .ctrl-btn:hover { transform: scale(1.1); color: var(--accent-glow); filter: drop-shadow(0 0 6px var(--accent-glow)); }
    .shuffle-active { color: var(--accent-glow) !important; filter: drop-shadow(0 0 5px var(--accent-glow)); }
    .play-pause-btn svg { width: 36px; height: 36px; }
    .player-volume { display: flex; align-items: center; gap: 10px; min-width: 130px; }
    .volume-slider { width: 90px; height: 4px; -webkit-appearance: none; background: var(--progress-bg); border-radius: 5px; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent-glow); border-radius: 50%; cursor: pointer; }
    .progress-row { width: 100%; display: flex; align-items: center; gap: 10px; margin-top: 5px; }
    .progress-container { flex: 1; height: 4px; background: var(--progress-bg); border-radius: 10px; cursor: pointer; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-glow)); border-radius: 10px; transition: width 0.1s linear; }
    .time-text { font-size: 0.7rem; font-family: monospace; }

    @media (max-width: 750px) {
      .sticky-player { flex-direction: column; align-items: stretch; padding: 0.8rem; gap: 0.6rem; }
      .player-track-info { justify-content: space-between; }
      .player-controls { justify-content: center; }
      .player-volume { justify-content: center; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">⚡Neon Echoes</div>
    <button class="shuffle-playlist-btn" id="shufflePlaylistBtn">🔀 Shuffle Playlist</button>
  <div class="search-wrapper">
    <span class="search-icon-left">🔍</span>
    <input type="text" class="search-input" id="globalSearch" placeholder="Search songs, artists...">
    <button class="voice-icon" id="voiceSearchBtn">🎙️</button>
  </div>
  <div class="nav-actions">
    <button class="theme-btn" id="themeToggleBtn">🌓 Dark/Light</button>

  </div>
</nav>

<div class="container">

  <div class="now-playing-section">
    <div class="player-card">
      <div class="album-art"><img id="mainCover" src="https://picsum.photos/id/104/300/300" alt="cover"></div>
      <div class="song-title" id="mainTitle">Neon Echoes</div>
      <div class="artist" id="mainArtist">Luna Ray</div>
      <div class="equalizer-animation" id="eqVisual">
        <div class="eq-bar-anim"></div><div class="eq-bar-anim"></div><div class="eq-bar-anim"></div><div class="eq-bar-anim"></div><div class="eq-bar-anim"></div>
      </div>
    </div>
  </div>

  <div class="playlist-header">
    <h2>🔥 Essential Vibes</h2>
    <span style="font-size:0.8rem;">curated premium flow</span>
  </div>
  <div id="playlistGrid" class="playlist-grid"></div>
</div>

<div class="sticky-player">
  <div class="player-track-info">
    <img id="bottomCover" class="mini-cover" src="https://picsum.photos/id/104/80/80" alt="cover">
    <div class="track-details">
      <h4 id="bottomTitle">Neon Echoes</h4>
      <p id="bottomArtist">Luna Ray</p>
    </div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="shuffleTrackBtn">🔀</button>
    <button class="ctrl-btn" id="prevBtnSticky"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
    <button class="ctrl-btn play-pause-btn" id="playPauseSticky"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>
    <button class="ctrl-btn" id="nextBtnSticky"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zm-3.5 6l-8.5-6v12z"/></svg></button>
  </div>
  <div class="player-volume">
    <span>🔊</span>
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.75">
  </div>
  <div class="progress-row">
    <span class="time-text" id="currentTimeLabel">0:00</span>
    <div class="progress-container" id="progressContainer"><div class="progress-fill" id="progressFillBar"></div></div>
    <span class="time-text" id="durationLabel">0:00</span>
  </div>
</div>

<script>
  // ---------- MUSIC LIBRARY ----------
  const originalSongs = [
    { id: 0, name: "Neon Echoes", artist: "Luna Ray", cover: "https://picsum.photos/id/104/200/200", duration: 198, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { id: 1, name: "Midnight Pulse", artist: "K. Avenue", cover: "https://picsum.photos/id/169/200/200", duration: 234, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { id: 2, name: "Electric Lullaby", artist: "Arctica", cover: "https://picsum.photos/id/155/200/200", duration: 187, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { id: 3, name: "Velvet Skies", artist: "Sage & Sol", cover: "https://picsum.photos/id/22/200/200", duration: 212, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
    { id: 4, name: "Lost Frequencies", artist: "Echo Vault", cover: "https://picsum.photos/id/99/200/200", duration: 245, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
    { id: 5, name: "Glow Drift", artist: "Mira Solis", cover: "https://picsum.photos/id/29/200/200", duration: 175, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" }
  ];

  let currentPlaylist = [...originalSongs];
  let currentIndex = 0;
  let isPlaying = false;
  let shuffleTrackMode = false;      // for track shuffle (next/prev)
  let shufflePlaylistMode = false;   // for playlist shuffle button (global reorder)
  let audio = new Audio();

  // DOM elements
  const mainCover = document.getElementById('mainCover');
  const mainTitle = document.getElementById('mainTitle');
  const mainArtist = document.getElementById('mainArtist');
  const bottomCover = document.getElementById('bottomCover');
  const bottomTitle = document.getElementById('bottomTitle');
  const bottomArtist = document.getElementById('bottomArtist');
  const playPauseSticky = document.getElementById('playPauseSticky');
  const prevBtn = document.getElementById('prevBtnSticky');
  const nextBtn = document.getElementById('nextBtnSticky');
  const shuffleTrackBtn = document.getElementById('shuffleTrackBtn');
  const shufflePlaylistBtn = document.getElementById('shufflePlaylistBtn');
  const volumeSlider = document.getElementById('volumeSlider');
  const progressFillBar = document.getElementById('progressFillBar');
  const progressContainer = document.getElementById('progressContainer');
  const currentTimeLabel = document.getElementById('currentTimeLabel');
  const durationLabel = document.getElementById('durationLabel');
  const playlistGrid = document.getElementById('playlistGrid');
  const searchInput = document.getElementById('globalSearch');
  const themeToggleBtn = document.getElementById('themeToggleBtn');

  let searchTerm = "";

  function formatTime(sec) {
    if (isNaN(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s < 10 ? '0' : ''}${s}`;
  }

  // update whole UI based on current playlist and index
  function updatePlayerUI() {
    const song = currentPlaylist[currentIndex];
    if (!song) return;
    mainCover.src = song.cover;
    mainTitle.innerText = song.name;
    mainArtist.innerText = song.artist;
    bottomCover.src = song.cover;
    bottomTitle.innerText = song.name;
    bottomArtist.innerText = song.artist;
    durationLabel.innerText = formatTime(song.duration);
    currentTimeLabel.innerText = "0:00";
    progressFillBar.style.width = "0%";
    highlightActiveSongInGrid();
  }

  function loadCurrentTrack(autoplay = false) {
    const song = currentPlaylist[currentIndex];
    if (!song) return;
    audio.pause();
    audio.src = song.url;
    audio.load();
    updatePlayerUI();
    if (autoplay) {
      audio.play().then(() => {
        isPlaying = true;
        updatePlayButtonIcon(true);
      }).catch(e => console.log);
    } else {
      isPlaying = false;
      updatePlayButtonIcon(false);
    }
  }

  function updatePlayButtonIcon(playing) {
    if (playing) {
      playPauseSticky.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/></svg>';
    } else {
      playPauseSticky.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32"><polygon points="5,3 19,12 5,21" fill="white"/></svg>';
    }
  }

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
    } else {
      audio.play().catch(e => console.log);
      isPlaying = true;
    }
    updatePlayButtonIcon(isPlaying);
  }

  function nextTrack() {
    let newIndex;
    if (shuffleTrackMode && currentPlaylist.length > 1) {
      let rand = Math.floor(Math.random() * currentPlaylist.length);
      while (rand === currentIndex && currentPlaylist.length > 1) rand = Math.floor(Math.random() * currentPlaylist.length);
      newIndex = rand;
    } else {
      newIndex = (currentIndex + 1) % currentPlaylist.length;
    }
    currentIndex = newIndex;
    loadCurrentTrack(true);
  }

  function prevTrack() {
    let newIndex;
    if (shuffleTrackMode && currentPlaylist.length > 1) {
      let rand = Math.floor(Math.random() * currentPlaylist.length);
      while (rand === currentIndex && currentPlaylist.length > 1) rand = Math.floor(Math.random() * currentPlaylist.length);
      newIndex = rand;
    } else {
      newIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
    }
    currentIndex = newIndex;
    loadCurrentTrack(true);
  }

  function toggleTrackShuffle() {
    shuffleTrackMode = !shuffleTrackMode;
    if (shuffleTrackMode) shuffleTrackBtn.classList.add('shuffle-active');
    else shuffleTrackBtn.classList.remove('shuffle-active');
  }

  // SHUFFLE PLAYLIST OPTION: reorder the entire current playlist (preserve original but shuffle the displayed/list order)
  function shufflePlaylistOrder() {
    if (shufflePlaylistMode) {
      // revert to original order filtered by search
      resetToOriginalOrder();
      shufflePlaylistMode = false;
      shufflePlaylistBtn.classList.remove('shuffle-active-global');
      shufflePlaylistBtn.style.background = "";
    } else {
      // shuffle current playlist (based on current search filter)
      for (let i = currentPlaylist.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentPlaylist[i], currentPlaylist[j]] = [currentPlaylist[j], currentPlaylist[i]];
      }
      shufflePlaylistMode = true;
      shufflePlaylistBtn.classList.add('shuffle-active-global');
      // reset index to 0 to start fresh
      currentIndex = 0;
      loadCurrentTrack(false);
      renderPlaylist(searchTerm);
    }
  }

  function resetToOriginalOrder() {
    let base = [...originalSongs];
    if (searchTerm.trim() !== "") {
      base = base.filter(s => s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.artist.toLowerCase().includes(searchTerm.toLowerCase()));
    }
    currentPlaylist = [...base];
    // ensure currentIndex is within bounds
    if (currentIndex >= currentPlaylist.length) currentIndex = 0;
    if (currentPlaylist.length === 0) currentPlaylist = [...originalSongs]; // fallback
  }

  // render playlist grid with search filter
  function renderPlaylist(filter = "") {
    let filtered = [...originalSongs];
    if (filter.trim() !== "") {
      filtered = filtered.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()));
    }
    // if shuffle playlist mode is active, we need to shuffle this filtered result but keep ordering consistent
    if (shufflePlaylistMode) {
      // preserve shuffled order but based on filtered ids
      const filteredIds = filtered.map(s => s.id);
      const currentShuffled = currentPlaylist.filter(s => filteredIds.includes(s.id));
      currentPlaylist = currentShuffled.length ? currentShuffled : filtered;
      if (currentPlaylist.length === 0) currentPlaylist = [...filtered];
    } else {
      currentPlaylist = [...filtered];
    }
    if (currentIndex >= currentPlaylist.length) currentIndex = Math.max(0, currentPlaylist.length - 1);
    if (currentPlaylist.length > 0 && currentIndex >= 0) updatePlayerUI();
    else if (currentPlaylist.length === 0) {
      // fallback
      currentPlaylist = [...originalSongs];
      currentIndex = 0;
      updatePlayerUI();
    }
    playlistGrid.innerHTML = "";
    currentPlaylist.forEach((song, idx) => {
      const card = document.createElement('div');
      card.className = `song-card ${currentIndex === idx ? 'active-song' : ''}`;
      card.innerHTML = `
        <img class="song-cover" src="${song.cover}" alt="${song.name}">
        <div class="song-name">${song.name}</div>
        <div class="song-artist">${song.artist}</div>
      `;
      card.addEventListener('click', () => {
        if (currentIndex === idx) togglePlay();
        else {
          currentIndex = idx;
          loadCurrentTrack(true);
        }
        renderPlaylist(searchTerm);
      });
      playlistGrid.appendChild(card);
    });
    highlightActiveSongInGrid();
  }

  function highlightActiveSongInGrid() {
    const cards = document.querySelectorAll('.song-card');
    cards.forEach((card, i) => {
      if (i === currentIndex) card.classList.add('active-song');
      else card.classList.remove('active-song');
    });
  }

  // audio event listeners
  audio.addEventListener('timeupdate', () => {
    if (audio.duration && !isNaN(audio.duration)) {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFillBar.style.width = `${percent}%`;
      currentTimeLabel.innerText = formatTime(audio.currentTime);
    }
  });
  progressContainer.addEventListener('click', (e) => {
    const rect = progressContainer.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    if (audio.duration) audio.currentTime = percent * audio.duration;
  });
  audio.addEventListener('ended', nextTrack);
  audio.addEventListener('play', () => { isPlaying = true; updatePlayButtonIcon(true); });
  audio.addEventListener('pause', () => { isPlaying = false; updatePlayButtonIcon(false); });
  audio.addEventListener('loadedmetadata', () => { if (audio.duration) durationLabel.innerText = formatTime(audio.duration); });

  volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

  // Event listeners
  playPauseSticky.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', prevTrack);
  nextBtn.addEventListener('click', nextTrack);
  shuffleTrackBtn.addEventListener('click', toggleTrackShuffle);
  shufflePlaylistBtn.addEventListener('click', () => shufflePlaylistOrder());
  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    shufflePlaylistMode = false;  // reset global shuffle mode on new search to avoid confusion
    shufflePlaylistBtn.classList.remove('shuffle-active-global');
    resetToOriginalOrder();
    renderPlaylist(searchTerm);
  });
  themeToggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('light');
  });
  document.getElementById('voiceSearchBtn').addEventListener('click', () => alert("🎙️ Voice search: Try 'play Neon Echoes'"));

  // initial load
  function init() {
    audio.volume = 0.75;
    volumeSlider.value = 0.75;
    currentPlaylist = [...originalSongs];
    renderPlaylist("");
    currentIndex = 0;
    loadCurrentTrack(false);
  }
  init();
</script>
</body>
</html>
